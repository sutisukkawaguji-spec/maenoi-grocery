<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เข้าสู่ระบบร้านแม่น้อย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    body {
      font-family: 'Noto Sans Thai', 'Outfit', system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4">

  <!-- Unconfigured Alert Banner -->
  <div id="unconfiguredAlert" class="fixed top-4 left-4 right-4 bg-amber-50 border border-amber-300 rounded-2xl p-4 text-amber-900 text-sm hidden flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-3">
      <span class="text-xl">⚠️</span>
      <div>
        <strong>ยังไม่ได้ตั้งค่าโปรเจกต์:</strong> กรุณาไปตั้งค่าการเชื่อมต่อฐานข้อมูล Supabase ก่อนเริ่มใช้งาน
      </div>
    </div>
    <a href="admin.html" class="px-4 py-2 bg-amber-600 text-white font-bold rounded-xl text-xs hover:bg-amber-700 transition-colors">ไปหน้าตั้งค่า</a>
  </div>

  <!-- Auth Card -->
  <div class="bg-white rounded-3xl shadow-xl max-w-md w-full p-6 md:p-8 border border-slate-100 space-y-6">
    <div class="text-center space-y-2">
      <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center text-emerald-600 text-3xl mx-auto">🔐</div>
      <h2 id="authTitle" class="text-2xl font-bold text-slate-900">เข้าสู่ระบบหลังบ้าน</h2>
      <p id="authSubtitle" class="text-sm text-slate-500">กรอกเบอร์โทรศัพท์และรหัสผ่านเพื่อเข้าจัดการร้านแม่น้อย</p>
    </div>

    <!-- Login/Signup Forms -->
    <form id="authForm" class="space-y-4 text-sm">
      <div>
        <label class="block font-semibold text-slate-700 mb-1">เบอร์โทรศัพท์ผู้ใช้งาน</label>
        <input type="tel" id="authPhone" required placeholder="เช่น 0880699227" pattern="[0-9]{10}" maxlength="10" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-base font-mono" />
      </div>
      <div>
        <label class="block font-semibold text-slate-700 mb-1">รหัสผ่าน</label>
        <div class="relative">
          <input type="password" id="authPassword" required placeholder="••••••••" minlength="6" class="w-full pl-4 pr-12 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-base" />
          <button type="button" id="btnTogglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-lg text-slate-400 hover:text-slate-600 focus:outline-none">
            👁️
          </button>
        </div>
      </div>

      <!-- Remember Me Checkbox -->
      <div class="flex items-center justify-between text-xs text-slate-500 pt-1">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="authRemember" checked class="w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500" />
          <span>จดจำการเข้าสู่ระบบในเครื่องนี้</span>
        </label>
      </div>

      <!-- Error / Success Messages -->
      <div id="authError" class="text-rose-500 font-semibold text-xs hidden bg-rose-50 p-3 rounded-xl border border-rose-100 leading-relaxed"></div>
      <div id="authSuccess" class="text-emerald-600 font-semibold text-xs hidden bg-emerald-50 p-3 rounded-xl border border-emerald-100 leading-relaxed"></div>

      <button type="submit" id="btnSubmit" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-sm transition-colors shadow-lg shadow-emerald-600/20">
        เข้าสู่ระบบ
      </button>
    </form>

    <!-- Toggle Action -->
    <div class="text-center text-xs text-slate-500">
      <span id="toggleText">ยังไม่มีบัญชีผู้ดูแลระบบ?</span>
      <button id="btnToggleAuthMode" class="text-emerald-600 font-bold hover:underline ml-1">สมัครสมาชิกใหม่</button>
    </div>
  </div>

  <script>
    let isSignUpMode = false;
    let sbClient = null;

    document.addEventListener('DOMContentLoaded', () => {
      // Check config
      if (!AppConfig.isConfigured()) {
        document.getElementById('unconfiguredAlert').classList.remove('hidden');
        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('btnSubmit').classList.add('opacity-50', 'cursor-not-allowed');
        return;
      }

      // Init Supabase with default client first
      const c = AppConfig.get();
      sbClient = supabase.createClient(c.supabaseUrl, c.supabaseAnonKey);

      // Check current session
      sbClient.auth.getSession().then(({ data }) => {
        if (data.session) {
          window.location.href = 'index.html';
        }
      });

      setupEventListeners();
    });

    function setupEventListeners() {
      const authForm = document.getElementById('authForm');
      const toggleBtn = document.getElementById('btnToggleAuthMode');
      const authTitle = document.getElementById('authTitle');
      const authSubtitle = document.getElementById('authSubtitle');
      const btnSubmit = document.getElementById('btnSubmit');
      const toggleText = document.getElementById('toggleText');

      const authError = document.getElementById('authError');
      const authSuccess = document.getElementById('authSuccess');
      const passwordInput = document.getElementById('authPassword');
      const togglePasswordBtn = document.getElementById('btnTogglePassword');

      // Toggle Password Visibility (Eye icon)
      togglePasswordBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          togglePasswordBtn.textContent = '🔒';
        } else {
          passwordInput.type = 'password';
          togglePasswordBtn.textContent = '👁️';
        }
      });

      // Switch Login/Signup Mode
      toggleBtn.addEventListener('click', () => {
        isSignUpMode = !isSignUpMode;
        
        authError.classList.add('hidden');
        authSuccess.classList.add('hidden');

        if (isSignUpMode) {
          authTitle.textContent = 'สมัครสมาชิกผู้ดูแล';
          authSubtitle.textContent = 'ลงทะเบียนด้วยเบอร์โทรและรหัสผ่านเพื่อเข้าใช้งานหลังบ้าน';
          btnSubmit.textContent = 'สมัครสมาชิกและเข้าใช้งานทันที';
          toggleText.textContent = 'มีบัญชีอยู่แล้ว?';
          toggleBtn.textContent = 'เข้าสู่ระบบ';
        } else {
          authTitle.textContent = 'เข้าสู่ระบบหลังบ้าน';
          authSubtitle.textContent = 'กรอกเบอร์โทรศัพท์และรหัสผ่านเพื่อเข้าจัดการร้านแม่น้อย';
          btnSubmit.textContent = 'เข้าสู่ระบบ';
          toggleText.textContent = 'ยังไม่มีบัญชีผู้ดูแลระบบ?';
          toggleBtn.textContent = 'สมัครสมาชิกใหม่';
        }
      });

      authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        authError.classList.add('hidden');
        authSuccess.classList.add('hidden');
        
        const phoneRaw = document.getElementById('authPhone').value.trim();
        const password = passwordInput.value;
        const remember = document.getElementById('authRemember').checked;

        if (phoneRaw.length !== 10 || isNaN(phoneRaw)) {
          authError.textContent = 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง (10 หลัก)';
          authError.classList.remove('hidden');
          return;
        }

        // Format phone to virtual email under the hood for free Supabase login
        const email = `${phoneRaw}@maenoi.store`;

        // Re-initialize Supabase client to dynamically set storage preference
        const c = AppConfig.get();
        sbClient = supabase.createClient(c.supabaseUrl, c.supabaseAnonKey, {
          auth: {
            persistSession: remember,
            storage: remember ? localStorage : sessionStorage
          }
        });

        btnSubmit.disabled = true;
        btnSubmit.textContent = 'กำลังดำเนินการ...';

        try {
          if (isSignUpMode) {
            // Sign Up
            const { data, error } = await sbClient.auth.signUp({
              email,
              password
            });
            if (error) throw error;
            
            // Auto login after sign up if not automatically logged in
            if (!data.session) {
              const loginRes = await sbClient.auth.signInWithPassword({
                email,
                password
              });
              if (loginRes.error) throw loginRes.error;
              data.session = loginRes.data.session;
            }

            if (data.session) {
              authSuccess.textContent = 'สมัครสมาชิกและเข้าสู่ระบบสำเร็จ! กำลังพาท่านไปหน้าหลัก...';
              authSuccess.classList.remove('hidden');
              setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } else {
              authSuccess.textContent = 'สมัครสมาชิกสำเร็จ! กรุณาลงชื่อเข้าใช้งาน';
              authSuccess.classList.remove('hidden');
              btnSubmit.disabled = false;
              btnSubmit.textContent = 'สมัครสมาชิกและเข้าใช้งานทันที';
            }
          } else {
            // Sign In
            const { data, error } = await sbClient.auth.signInWithPassword({
              email,
              password
            });
            if (error) throw error;

            if (data.session) {
              authSuccess.textContent = 'เข้าสู่ระบบสำเร็จ! กำลังพาท่านไปยังหน้าหลัก...';
              authSuccess.classList.remove('hidden');
              setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } else {
              throw new Error('ไม่พบข้อมูลเซสชันหลังเข้าสู่ระบบ');
            }
          }
        } catch (err) {
          console.error(err);
          // Customize common error messages to Thai
          let errorMsg = err.message || 'การยืนยันตัวตนล้มเหลว';
          if (errorMsg.includes('Invalid login credentials')) {
            errorMsg = 'เบอร์โทรศัพท์ หรือรหัสผ่านไม่ถูกต้อง';
          } else if (errorMsg.includes('User already registered')) {
            errorMsg = 'เบอร์โทรศัพท์นี้ถูกใช้สมัครสมาชิกไปแล้ว';
          }
          authError.textContent = 'ข้อผิดพลาด: ' + errorMsg;
          authError.classList.remove('hidden');
          btnSubmit.disabled = false;
          btnSubmit.textContent = isSignUpMode ? 'สมัครสมาชิกและเข้าใช้งานทันที' : 'เข้าสู่ระบบ';
        }
      });
    }
  </script>
</body>
</html>
